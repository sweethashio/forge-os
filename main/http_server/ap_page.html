<!DOCTYPE html>
<html>
<head>
    <title>BitForge AP Status</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container { 
            max-width: 500px;
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 40px 30px;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }
        h1 {
            font-size: 1.8em;
            margin-bottom: 10px;
            text-align: center;
            color: #ffffff;
        }
        .subtitle {
            text-align: center;
            color: #a0a0a0;
            font-size: 0.9em;
            margin-bottom: 30px;
        }
        .status-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 20px;
        }
        .status-label {
            font-size: 0.85em;
            color: #a0a0a0;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 10px;
        }
        .status-value {
            font-size: 1.1em;
            margin-bottom: 5px;
        }
        .ip-display { 
            font-size: 2em;
            font-weight: bold;
            color: #4CAF50;
            font-family: 'Courier New', monospace;
            word-break: break-all;
        }
        .status-connected {
            color: #4CAF50;
        }
        .status-disconnected {
            color: #ff9800;
        }
        .status-icon {
            display: inline-block;
            margin-right: 8px;
        }
        .loading {
            text-align: center;
            color: #a0a0a0;
        }
        .info-text {
            text-align: center;
            color: #a0a0a0;
            font-size: 0.85em;
            margin-top: 20px;
            line-height: 1.6;
        }
        .refresh-indicator {
            text-align: center;
            color: #666;
            font-size: 0.75em;
            margin-top: 15px;
        }
        .link-button {
            display: block;
            text-align: center;
            margin-top: 20px;
            padding: 12px 20px;
            background: rgba(76, 175, 80, 0.1);
            border: 1px solid rgba(76, 175, 80, 0.3);
            border-radius: 10px;
            color: #4CAF50;
            text-decoration: none;
            transition: all 0.3s ease;
        }
        .link-button:hover {
            background: rgba(76, 175, 80, 0.2);
            border-color: rgba(76, 175, 80, 0.5);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>BitForge Network</h1>
        <div class="subtitle">Access Point Status</div>

        <div class="status-card">
            <div class="status-label">WiFi Connection Status</div>
            <div id="status" class="status-value loading">
                <span class="status-icon"></span> Loading...
            </div>
        </div>

        <div class="status-card">
            <div class="status-label">Station IP Address</div>
            <div class="ip-display" id="ip">---</div>
        </div>

        <div class="info-text">
            This is the IP address of your BitForge device on your home WiFi network. 
            Use this address to access the device when connected to the same network.
        </div>

        <a href="/" class="link-button" id="mainLink" style="display: none;">
            Open Full Interface
        </a>

        <div class="refresh-indicator">Auto-refreshing every 5 seconds</div>
    </div>

    <script>
        async function updateStatus() {
            try {
                const response = await fetch('/api/ap/info');
                const data = await response.json();
                
                const statusDiv = document.getElementById('status');
                const ipDiv = document.getElementById('ip');
                const mainLink = document.getElementById('mainLink');
                
                if (data.staConnected) {
                    statusDiv.innerHTML = '<span class="status-icon"></span> Connected to WiFi';
                    statusDiv.className = 'status-value status-connected';
                    ipDiv.innerHTML = data.staIp || 'No IP';
                    ipDiv.style.color = '#4CAF50';
                    
                    // Show link to main interface if we have an IP
                    if (data.staIp && data.staIp !== '') {
                        mainLink.style.display = 'block';
                        mainLink.href = 'http://' + data.staIp;
                    }
                } else {
                    statusDiv.innerHTML = '<span class="status-icon"></span> Not Connected to WiFi';
                    statusDiv.className = 'status-value status-disconnected';
                    ipDiv.innerHTML = 'No Connection';
                    ipDiv.style.color = '#ff9800';
                    mainLink.style.display = 'none';
                }
            } catch (error) {
                console.error('Error fetching status:', error);
                document.getElementById('status').innerHTML = '<span class="status-icon"></span> Error loading status';
                document.getElementById('status').className = 'status-value status-disconnected';
            }
        }
        
        // Update immediately on load
        updateStatus();
        
        // Then update every 5 seconds
        setInterval(updateStatus, 5000);
    </script>
</body>
</html>
